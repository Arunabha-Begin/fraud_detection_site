<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Fraud Detection</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="toggle" onclick="toggleTheme()">Dark Mode</div>

<div class="container">
    <h1>Fraud Transaction Detector</h1>
    <p>Check if a transaction is safe or fraudulent</p>

    <div class="input-group" id="amount-group">
        <label>Transaction Amount</label>
        <input type="number" id="amount">
        <div class="error-text">This field is required</div>
    </div>

    <div class="input-group" id="time-group">
        <label>Transaction Time</label>
        <input type="number" id="time">
        <div class="error-text">This field is required</div>
    </div>

    <button onclick="predict()">Analyze</button>

    <div class="loader" id="loader">
        <div></div><div></div><div></div>
    </div>

    <div id="result" class="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
